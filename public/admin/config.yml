backend:
  name: github
  repo: andavidp95/upstore-web
  branch: main
  base_url: ""

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "marcas"
    label: "Marcas"
    folder: "src/content/marcas"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Logo (ruta)", name: "logo", widget: "string", hint: "Ruta absoluta, ej: /images/brands/marca.svg" }
      - { label: "Sitio Web", name: "url", widget: "string", required: false }
      - { label: "Orden", name: "order", widget: "number", hint: "Menor = primero", required: false }
      - { label: "Activa", name: "active", widget: "boolean", default: true }

  - name: "equipos"
    label: "Equipos UPS"
    folder: "src/content/equipos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Precio (USD)", name: "price", widget: "number", min: 0, value_type: "float" }
      - { label: "URL de Imagen", name: "imageUrl", widget: "string", hint: "Ruta absoluta, ej: /images/products/mi-ups.png" }
      - { label: "Link del Fabricante", name: "productLink", widget: "string", required: false }
      - label: "Marca"
        name: "brand"
        widget: "select"
        options:
          - { label: "APC by Schneider Electric", value: "APC" }
          - { label: "Vertiv", value: "VERTIV" }
          - { label: "Hbit", value: "HBIT" }
          - { label: "HKIVI", value: "HKIVI" }
          - { label: "Shanqiu", value: "SHANQIU" }
          - { label: "Otros", value: "OTROS" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Mini UPS", value: "MINI_UPS" }
          - { label: "Monofásico", value: "MONOFASICO" }
          - { label: "Bifásico", value: "BIFASICO" }
          - { label: "Trifásico", value: "TRIFASICO" }
      - label: "Estado"
        name: "status"
        widget: "select"
        options:
          - { label: "En Stock", value: "STOCK" }
          - { label: "Preventa", value: "PREVENTA" }
          - { label: "Por Llegar", value: "POR_LLEGAR" }
          - { label: "Bajo Pedido", value: "BAJO_PEDIDO" }
          - { label: "Agotado", value: "AGOTADO" }
      - { label: "Capacidad", name: "capacity", widget: "string", hint: "Ej: 1000VA, MINI_12V, 3000VA", required: false }
      - { label: "Voltaje", name: "voltage", widget: "string", hint: "Ej: 120V, 220V", required: false }
      - label: "Forma Factor"
        name: "formFactor"
        widget: "select"
        options:
          - { label: "Mini", value: "MINI" }
          - { label: "Torre", value: "TOWER" }
          - { label: "Rack", value: "RACK" }
          - { label: "Torre/Rack", value: "TOWER_RACK" }
          - { label: "Otro", value: "OTRO" }
        required: false
      - { label: "Baterías externas", name: "externalBattery", widget: "boolean", default: false, hint: "¿Compatible con expansión de baterías externas?" }
      - { label: "Contenido (Markdown)", name: "body", widget: "markdown", required: false }

  - name: "baterias"
    label: "Baterías"
    folder: "src/content/baterias"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Precio (USD)", name: "price", widget: "number", min: 0, value_type: "float" }
      - { label: "URL de Imagen", name: "imageUrl", widget: "string", hint: "Ruta absoluta, ej: /images/products/bateria.png" }
      - { label: "Link del Fabricante", name: "productLink", widget: "string", required: false }
      - label: "Marca"
        name: "brand"
        widget: "select"
        options:
          - { label: "APC by Schneider Electric", value: "APC" }
          - { label: "Vertiv", value: "VERTIV" }
          - { label: "Hbit", value: "HBIT" }
          - { label: "HKIVI", value: "HKIVI" }
          - { label: "Shanqiu", value: "SHANQIU" }
          - { label: "Otros", value: "OTROS" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Batería VRLA", value: "VRLA" }
          - { label: "Batería AGM", value: "AGM" }
          - { label: "Banco de Baterías", value: "BANCO_BATERIAS" }
          - { label: "Gabinete para Batería", value: "GABINETE_BATERIA" }
          - { label: "Otros", value: "OTROS" }
      - label: "Estado"
        name: "status"
        widget: "select"
        options:
          - { label: "En Stock", value: "STOCK" }
          - { label: "Preventa", value: "PREVENTA" }
          - { label: "Por Llegar", value: "POR_LLEGAR" }
          - { label: "Bajo Pedido", value: "BAJO_PEDIDO" }
          - { label: "Agotado", value: "AGOTADO" }
      - { label: "Contenido (Markdown)", name: "body", widget: "markdown", required: false }

  - name: "accesorios"
    label: "Accesorios para UPS"
    folder: "src/content/accesorios"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Precio (USD)", name: "price", widget: "number", min: 0, value_type: "float" }
      - { label: "URL de Imagen", name: "imageUrl", widget: "string", hint: "Ruta absoluta, ej: /images/products/accesorio.png" }
      - { label: "Link del Fabricante", name: "productLink", widget: "string", required: false }
      - label: "Marca"
        name: "brand"
        widget: "select"
        options:
          - { label: "APC by Schneider Electric", value: "APC" }
          - { label: "Vertiv", value: "VERTIV" }
          - { label: "Hbit", value: "HBIT" }
          - { label: "HKIVI", value: "HKIVI" }
          - { label: "Shanqiu", value: "SHANQIU" }
          - { label: "Otros", value: "OTROS" }
        required: false
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Tarjeta SNMP", value: "TARJETA_SNMP" }
          - { label: "Tarjeta de Comunicación", value: "TARJETA_COMUNICACION" }
          - { label: "PDU", value: "PDU" }
          - { label: "Bypass", value: "BYPASS" }
          - { label: "Rack", value: "RACK" }
          - { label: "Cableado", value: "CABLEADO" }
          - { label: "Kit de Montaje", value: "KIT_MONTAJE" }
          - { label: "Repuesto", value: "REPUESTO" }
          - { label: "Otros", value: "OTROS" }
      - label: "Estado"
        name: "status"
        widget: "select"
        options:
          - { label: "En Stock", value: "STOCK" }
          - { label: "Preventa", value: "PREVENTA" }
          - { label: "Por Llegar", value: "POR_LLEGAR" }
          - { label: "Bajo Pedido", value: "BAJO_PEDIDO" }
          - { label: "Agotado", value: "AGOTADO" }
      - { label: "Contenido (Markdown)", name: "body", widget: "markdown", required: false }

  - name: "servicios"
    label: "Servicios"
    folder: "src/content/servicios"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Descripción Corta", name: "shortDescription", widget: "text", hint: "1-2 líneas descriptivas" }
      - { label: "URL de Imagen", name: "imageUrl", widget: "string", hint: "Ruta absoluta, ej: /images/servicios/mantenimiento.jpg" }
      - { label: "Orden", name: "order", widget: "number", hint: "Menor = primero", required: false }
      - { label: "Contenido (Markdown)", name: "body", widget: "markdown", required: false }

  - name: "clientes"
    label: "Clientes"
    folder: "src/content/clientes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Logo (ruta)", name: "logo", widget: "string", hint: "Ruta absoluta, ej: /images/clients/nombre.svg" }
      - { label: "Sitio Web", name: "url", widget: "string", required: false }
      - { label: "Orden", name: "order", widget: "number", hint: "Menor = primero", required: false }
      - { label: "Activo", name: "active", widget: "boolean", default: true }
      - { label: "Descripción", name: "body", widget: "markdown", required: false }

  - name: "promos"
    label: "Promos del Mes"
    folder: "src/content/promos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre", name: "name", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "Precio Promo (USD)", name: "price", widget: "number", min: 0, value_type: "float" }
      - { label: "Precio Original (USD)", name: "originalPrice", widget: "number", min: 0, value_type: "float", required: false }
      - { label: "URL de Imagen", name: "imageUrl", widget: "string" }
      - label: "Marca"
        name: "brand"
        widget: "select"
        options:
          - { label: "APC", value: "APC" }
          - { label: "Vertiv", value: "VERTIV" }
          - { label: "Hbit", value: "HBIT" }
          - { label: "HKIVI", value: "HKIVI" }
          - { label: "Shanqiu", value: "SHANQIU" }
          - { label: "Otros", value: "OTROS" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Mini UPS", value: "MINI_UPS" }
          - { label: "Monofásico", value: "MONOFASICO" }
          - { label: "Bifásico", value: "BIFASICO" }
          - { label: "Trifásico", value: "TRIFASICO" }
          - { label: "Batería", value: "BATERIA" }
          - { label: "Accesorio", value: "ACCESORIO" }
      - { label: "Descuento", name: "discount", widget: "string", hint: "Ej: -20%, -150$", required: false }
      - { label: "Badge", name: "badge", widget: "string", hint: "Ej: OFERTA, NUEVO", required: false }
      - { label: "Slug del Producto", name: "productSlug", widget: "string", hint: "Slug del producto al que enlaza (sin /producto/)", required: false }
      - { label: "Orden", name: "order", widget: "number", hint: "Menor = primero", required: false }
      - { label: "Activo", name: "active", widget: "boolean", default: true }

  - name: "noticias"
    label: "Noticias"
    folder: "src/content/noticias"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descripción", name: "description", widget: "text" }
      - { label: "URL de Imagen", name: "imageUrl", widget: "string" }
      - { label: "Autor", name: "author", widget: "string", default: "UPStore" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Noticia", value: "NOTICIA" }
          - { label: "Proyecto", value: "PROYECTO" }
          - { label: "Tendencia", value: "TENDENCIA" }
          - { label: "Guía", value: "GUIA" }
      - { label: "Orden", name: "order", widget: "number", hint: "Menor = primero", required: false }
      - { label: "Activo", name: "active", widget: "boolean", default: true }
      - { label: "Contenido (Markdown)", name: "body", widget: "markdown", required: false }
